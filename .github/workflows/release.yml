name: Build and Release Browser Bundle

on:
  push:
    branches:
      - v0.3

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Delete previous releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName -q '.[].tagName' | while read -r tag; do
            gh release delete "$tag" -y --cleanup-tag
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            dist/cantabile.js \
            dist/cantabile.js.map \
            dist/cantabile.min.js \
            dist/cantabile.min.js.map \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "Browser build of @toptensoftware/cantabile-js v${{ steps.version.outputs.version }}"
